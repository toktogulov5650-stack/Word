services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: word-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      PORT: ${APP_PORT:-8080}
      Swagger__Enabled: ${SWAGGER_ENABLED:-false}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:${APP_PORT:-8080}"
